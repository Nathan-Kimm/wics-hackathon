<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div id="container">
        <div id="top-section">
            <h1 id="rainbow-title">spotichrd</h1>
            <div id="current-track">
                <img id="album-image" src="" alt="Album cover" style="width: 60px; height: 60px; border-radius: 4px; display: none;">
                <div id="track-info">
                    <div id="track-name">No track playing</div>
                    <div id="artist-name"></div>
                </div>
            </div>
            <div id="chords-section">
                <h2>Progression:</h2>
                <div id="chords-list"></div>
            </div>
        </div>

        <hr id="divider">

        <div id="chat-section">
            <div id="chat-messages"></div>
            <div id="chat-input-row">
                <input id="chat-input" type="text" placeholder="ask about this song..." autocomplete="off">
                <button id="chat-send">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
